<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Training App</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white p-4">
  <h1 class="text-xl font-bold mb-4">Training Schedule</h1>
  
  <div class="bg-slate-900 p-1 rounded-xl flex mb-6 border border-slate-800">
    <button id="btn-today" onclick="setView('today')" class="w-1/2 py-2 text-sm bg-slate-800 rounded-lg font-bold">Today</button>
    <button id="btn-week" onclick="setView('week')" class="w-1/2 py-2 text-sm text-slate-800/0 font-bold">Week</button>
  </div>
  
  <div id="app" class="space-y-4"></div>

  <script>
    const saved = JSON.parse(localStorage.getItem('tr_data') || '{}');
    const schedule = [
      { id: 'mon', date: '2026-06-29', title: 'Gym (Legs)', desc: 'Heavy compound lifts.' },
      { id: 'tue', date: '2026-06-30', title: 'Gym (Push) + Cycle', desc: 'Push sets + 20m ride.' },
      { id: 'wed', date: '2026-07-01', title: 'Club Run', desc: '5k Hilly loop.' },
      { id: 'thu', date: '2026-07-02', title: 'Rest Day', desc: 'Full recovery.', isRest: true }
    ];

    function render(mode) {
      const app = document.getElementById('app');
      app.innerHTML = '';
      
      // In 'today' mode, show only the first item if no date match
      const items = (mode === 'today') ? [schedule[0]] : schedule;

      items.forEach(item => {
        const isDone = saved[item.id];
        const div = document.createElement('div');
        div.className = `p-4 rounded-xl border border-slate-800 flex justify-between items-center ${isDone ? 'opacity-40 border-emerald-900' : 'bg-slate-900'}`;
        div.innerHTML = `
          <div>
            <h2 class="font-bold">${item.title}</h2>
            <p class="text-sm text-slate-400">${item.desc}</p>
          </div>
          ${!item.isRest ? `<button onclick="toggle('${item.id}')" class="w-6 h-6 border-2 rounded-full ${isDone ? 'bg-emerald-500' : 'border-slate-700'}"></button>` : '<span>🔒</span>'}
        `;
        app.appendChild(div);
      });
    }

    function setView(mode) {
      document.getElementById('btn-today').className = `w-1/2 py-2 text-sm rounded-lg font-bold ${mode === 'today' ? 'bg-slate-800' : 'bg-transparent'}`;
      document.getElementById('btn-week').className = `w-1/2 py-2 text-sm rounded-lg font-bold ${mode === 'week' ? 'bg-slate-800' : 'bg-transparent'}`;
      render(mode);
    }

    render('today');
  </script>
</body>
</html>
